<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scan Viewer</title>
<style>
  :root {
    --bg: #0f0f10;
    --panel: #1a1a1c;
    --panel-2: #232326;
    --border: #2e2e32;
    --border-strong: #3a3a40;
    --text: #e0e0e2;
    --text-dim: #888890;
    --text-faint: #5a5a60;
    --accent: #ff7b29;
    --accent-dim: #8a4419;
    --accent-faint: rgba(255, 123, 41, 0.15);
    --good: #5eb95e;
    --warn: #f0ad4e;
    --bar-h: 44px;
    --rail-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    user-select: none;
  }
  button, input, select { font-family: inherit; font-size: inherit; }

  /* ============================================================
     LAYOUT
     ============================================================ */
  #app {
    display: grid;
    grid-template-rows: var(--bar-h) 1fr;
    height: 100vh;
  }
  #topbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #topbar .title {
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  #topbar .title .accent { color: var(--accent); }
  #topbar .spacer { flex: 1; }
  #topbar .hint {
    font-size: 11px;
    color: var(--text-faint);
  }

  #main {
    display: grid;
    grid-template-columns: var(--rail-w) 1fr;
    overflow: hidden;
  }

  /* ============================================================
     STATION RAIL (LEFT)
     ============================================================ */
  #rail {
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  #rail-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #rail-header .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    font-weight: 600;
  }
  #rail-header .count {
    font-size: 11px;
    color: var(--text-faint);
  }
  #station-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .station {
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 2px solid transparent;
    transition: background 0.08s;
  }
  .station:hover { background: var(--panel-2); }
  .station.active {
    background: var(--accent-faint);
    border-left-color: var(--accent);
  }
  .station .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
  }
  .station.has-pano .dot { background: var(--accent); }
  .station .name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .station.disabled { cursor: default; opacity: 0.5; }
  .station.disabled .name { color: var(--text-faint); }

  #rail-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ============================================================
     LOAD STATE / FILE INPUTS
     ============================================================ */
  .file-btn {
    width: 100%;
    padding: 8px 10px;
    background: var(--panel-2);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-size: 12px;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-btn:hover { background: var(--border); border-color: var(--accent-dim); }
  .file-btn.loaded { border-color: var(--good); }
  .file-btn .ico {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .file-btn .status {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-faint);
  }
  .file-btn.loaded .status { color: var(--good); }
  .file-input { display: none; }

  /* ============================================================
     VIEWPORTS
     ============================================================ */
  #viewports {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }
  .viewport {
    position: relative;
    overflow: hidden;
    background: #050506;
  }
  .viewport + .viewport {
    border-left: 1px solid var(--border);
  }
  .viewport canvas { display: block; outline: none; }

  .viewport-label {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 10px;
    background: rgba(20, 20, 22, 0.85);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    pointer-events: none;
  }
  .viewport-label .accent {
    color: var(--accent);
    font-weight: 600;
    margin-left: 6px;
  }

  .viewport-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 13px;
    pointer-events: none;
    text-align: center;
    padding: 40px;
  }

  .empty-state {
    max-width: 280px;
    line-height: 1.5;
  }
  .empty-state .heading {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 500;
  }

  /* ============================================================
     PANO CONTROLS (bottom of right pane)
     ============================================================ */
  #pano-controls {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: rgba(20, 20, 22, 0.85);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  #pano-controls.show {
    opacity: 1;
    pointer-events: auto;
  }
  .pano-btn {
    padding: 6px 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 4px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pano-btn:hover { background: var(--panel-2); color: var(--text); }
  .pano-btn:disabled { opacity: 0.3; cursor: default; }
  .pano-btn:disabled:hover { background: transparent; color: var(--text-dim); }

  /* ============================================================
     SETTINGS POPOVER
     ============================================================ */
  .icon-btn {
    width: 28px;
    height: 28px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover {
    background: var(--panel-2);
    border-color: var(--border-strong);
    color: var(--text);
  }
  .icon-btn.active {
    background: var(--accent-faint);
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  #settings-popover {
    position: absolute;
    top: 50px;
    right: 12px;
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    z-index: 100;
    display: none;
  }
  #settings-popover.show { display: block; }
  #settings-popover .section + .section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  #settings-popover .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .field label {
    flex: 1;
    color: var(--text-dim);
  }
  .field input[type="range"] {
    flex: 1.5;
    accent-color: var(--accent);
    height: 4px;
  }
  .field input[type="number"] {
    width: 60px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 11px;
  }
  .field select {
    flex: 1.5;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 11px;
  }
  .field input[type="checkbox"] { accent-color: var(--accent); }

  .badge {
    display: inline-block;
    padding: 1px 6px;
    background: var(--accent-faint);
    color: var(--accent);
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
  }
  .badge.dim {
    background: var(--panel-2);
    color: var(--text-faint);
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>
<body>

<div id="app">

  <div id="topbar">
    <div class="title">Scan Viewer</div>
    <div class="spacer"></div>
    <div class="hint" id="topbar-hint">Load a PLY and stations JSON to begin</div>
    <button class="icon-btn" id="settings-btn" title="View settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div id="main">

    <div id="rail">
      <div id="rail-header">
        <div class="label">Stations</div>
        <div class="count" id="station-count">—</div>
      </div>
      <div id="station-list">
        <div style="padding: 16px 14px; color: var(--text-faint); font-size: 12px; line-height: 1.5;">
          No stations loaded yet.
        </div>
      </div>
      <div id="rail-footer">
        <input type="file" id="ply-input" accept=".ply" class="file-input">
        <button class="file-btn" data-target="ply-input" id="ply-btn">
          <span class="ico">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </span>
          PLY point cloud
          <span class="status">empty</span>
        </button>

        <input type="file" id="json-input" accept=".json" class="file-input">
        <button class="file-btn" data-target="json-input" id="json-btn">
          <span class="ico">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </span>
          Stations JSON
          <span class="status">empty</span>
        </button>

        <input type="file" id="pano-input" accept="image/*" multiple class="file-input">
        <button class="file-btn" data-target="pano-input" id="pano-btn">
          <span class="ico">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/><path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"/></svg>
          </span>
          Pano images
          <span class="status">empty</span>
        </button>
      </div>
    </div>

    <div id="viewports">
      <div class="viewport" id="vp-cloud">
        <div class="viewport-label">Point cloud<span class="accent" id="cloud-units"></span></div>
        <div class="viewport-overlay" id="cloud-empty">
          <div class="empty-state">
            <div class="heading">Point cloud viewport</div>
            Load a PLY file to view the point cloud.
          </div>
        </div>
      </div>
      <div class="viewport" id="vp-pano">
        <div class="viewport-label">Pano view<span class="accent" id="pano-station-label"></span></div>
        <div class="viewport-overlay" id="pano-empty">
          <div class="empty-state">
            <div class="heading">Pano viewport</div>
            Click a station with a loaded pano to view it here.
          </div>
        </div>
        <div id="pano-controls">
          <button class="pano-btn" id="pano-prev" title="Previous station (←)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="pano-btn" id="pano-reset" title="Reset view (R)">Reset view</button>
          <button class="pano-btn" id="pano-next" title="Next station (→)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <div id="settings-popover">
    <div class="section">
      <div class="section-label">Coordinate System</div>
      <div class="field">
        <label>Up axis</label>
        <select id="up-axis">
          <option value="z" selected>Z-up</option>
          <option value="y">Y-up</option>
        </select>
      </div>
      <div class="field">
        <label>Cloud units</label>
        <select id="unit-mode">
          <option value="auto" selected>Auto-detect</option>
          <option value="m">Meters</option>
          <option value="ft">Feet</option>
          <option value="in">Inches</option>
          <option value="mm">Millimeters</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Point Cloud</div>
      <div class="field">
        <label>Point size</label>
        <input type="range" id="point-size" min="0.5" max="6" step="0.1" value="1.5">
      </div>
      <div class="field">
        <label>Background</label>
        <select id="bg-color">
          <option value="dark" selected>Dark</option>
          <option value="black">Black</option>
          <option value="grey">Grey</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Markers</div>
      <div class="field">
        <label>Show markers</label>
        <input type="checkbox" id="show-markers" checked>
      </div>
      <div class="field">
        <label>Show grid</label>
        <input type="checkbox" id="show-grid" checked>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Pano</div>
      <div class="field">
        <label>FOV</label>
        <input type="range" id="pano-fov" min="30" max="110" step="1" value="75">
      </div>
    </div>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

/* ============================================================
   PROJECT CONFIG — edit these to preconfigure a viewer page
   ============================================================
   Set any of these to a URL string to auto-load on page open.
   Set to null to require manual file selection.

   Pano matching modes:
     'id'        — match filename to station.id (e.g. "5.jpg" → id "5")
     'sequence'  — match by file order to station order in JSON
                   (1st pano file → 1st station, 2nd → 2nd, …)
     'id-shift'  — match filename N to station with id (N + PANO_ID_SHIFT)
                   Use when filenames are 1-indexed but station ids are 0-indexed:
                   PANO_ID_SHIFT = -1 means "1.jpg" → station id "0"
*/
const CONFIG = {
  PLY_URL:        null,         // e.g. './scans/site-a.ply'
  STATIONS_URL:   null,         // e.g. './scans/site-a-stations.json'
  PANO_FOLDER:    null,         // e.g. './scans/site-a/panos/'  — preferred if all panos live together
  PANO_EXT:       'jpg',        // file extension used when building URLs from PANO_FOLDER
  PANO_URLS:      null,         // explicit list, used if PANO_FOLDER is not set
  PROJECT_NAME:   null,         // shown in topbar if set

  PANO_MATCH_MODE: 'id-shift',  // 'id' | 'sequence' | 'id-shift'
  PANO_ID_SHIFT:   -1,          // used when PANO_MATCH_MODE === 'id-shift'
                                // -1 means file "1.jpg" → station with id 0

  UNIT_MODE:       'auto',      // 'auto' | 'm' | 'ft' | 'in' | 'mm'
  UP_AXIS:         'z',         // 'z' | 'y'
};

/* ============================================================
   STATE
   ============================================================ */
const state = {
  pointCloud: null,
  stations: [],            // [{id, position: Vector3 (raw), quaternion, raw}]
  panoTextures: new Map(), // id -> THREE.Texture
  activeStationId: null,
  unitScale: 1,            // multiplier to convert PLY into meters
  unitMode: CONFIG.UNIT_MODE,
  detectedUnit: null,
  upAxis: CONFIG.UP_AXIS,
  pointSize: 1.5,
  showMarkers: true,
  showGrid: true,
  bgColor: 'dark',
  panoFov: 75,
};

const BG_COLORS = { dark: 0x0f0f10, black: 0x000000, grey: 0x202024 };

/* ============================================================
   CLOUD VIEWPORT (left)
   ============================================================ */
const cloudVP = document.getElementById('vp-cloud');
const cloudRenderer = new THREE.WebGLRenderer({ antialias: true });
cloudRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
cloudVP.appendChild(cloudRenderer.domElement);

const cloudScene = new THREE.Scene();
cloudScene.background = new THREE.Color(BG_COLORS.dark);

const cloudCamera = new THREE.PerspectiveCamera(50, 1, 0.01, 10000);
cloudCamera.position.set(10, 10, 10);

const cloudControls = new OrbitControls(cloudCamera, cloudRenderer.domElement);
cloudControls.enableDamping = true;
cloudControls.dampingFactor = 0.08;

// Coord root: applies up-axis correction to all scene contents
const coordRoot = new THREE.Group();
cloudScene.add(coordRoot);

// Grid (lives in scene, not coord root, since it's always horizontal in world)
let gridHelper = new THREE.GridHelper(20, 20, 0x2a2a30, 0x1a1a1e);
cloudScene.add(gridHelper);

// Markers / cloud all live in coordRoot
const markerGroup = new THREE.Group();
coordRoot.add(markerGroup);

const markerMeshes = new Map();   // id -> Mesh

const MARKER_COLOR_IDLE = 0xff7b29;
const MARKER_COLOR_ACTIVE = 0xffffff;

function applyUpAxis() {
  if (state.upAxis === 'z') {
    coordRoot.rotation.set(-Math.PI / 2, 0, 0);
  } else {
    coordRoot.rotation.set(0, 0, 0);
  }
}
applyUpAxis();

/* ============================================================
   PANO VIEWPORT (right)
   ============================================================ */
const panoVP = document.getElementById('vp-pano');
const panoRenderer = new THREE.WebGLRenderer({ antialias: true });
panoRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
panoVP.appendChild(panoRenderer.domElement);

const panoScene = new THREE.Scene();
panoScene.background = new THREE.Color(0x000000);

const panoCamera = new THREE.PerspectiveCamera(75, 1, 0.1, 100);
panoCamera.position.set(0, 0, 0.01);

// Custom drag-to-look controls (simpler than OrbitControls for inside-out view)
const panoView = { lon: 0, lat: 0, dragging: false, lastX: 0, lastY: 0 };
panoRenderer.domElement.addEventListener('pointerdown', (e) => {
  panoView.dragging = true;
  panoView.lastX = e.clientX;
  panoView.lastY = e.clientY;
  panoRenderer.domElement.setPointerCapture(e.pointerId);
});
panoRenderer.domElement.addEventListener('pointermove', (e) => {
  if (!panoView.dragging) return;
  const dx = e.clientX - panoView.lastX;
  const dy = e.clientY - panoView.lastY;
  panoView.lastX = e.clientX;
  panoView.lastY = e.clientY;
  panoView.lon -= dx * 0.2;
  panoView.lat = Math.max(-89, Math.min(89, panoView.lat + dy * 0.2));
});
panoRenderer.domElement.addEventListener('pointerup', (e) => {
  panoView.dragging = false;
  try { panoRenderer.domElement.releasePointerCapture(e.pointerId); } catch (_) {}
});
panoRenderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  state.panoFov = Math.max(20, Math.min(110, state.panoFov + e.deltaY * 0.05));
  panoCamera.fov = state.panoFov;
  panoCamera.updateProjectionMatrix();
  document.getElementById('pano-fov').value = state.panoFov;
}, { passive: false });

// --- PLY ---
async function loadPLYFromBuffer(buffer, displayName) {
  const geom = new PLYLoader().parse(buffer);
  geom.computeBoundingBox();

  if (state.pointCloud) {
    coordRoot.remove(state.pointCloud);
    state.pointCloud.geometry.dispose();
    state.pointCloud.material.dispose();
  }

  const hasColor = geom.hasAttribute('color');
  const material = new THREE.PointsMaterial({
    size: state.pointSize,
    vertexColors: hasColor,
    color: hasColor ? 0xffffff : 0xcccccc,
    sizeAttenuation: false,
  });
  state.pointCloud = new THREE.Points(geom, material);
  coordRoot.add(state.pointCloud);

  detectAndApplyUnits();
  rebuildSceneScale();
  frameAll();

  document.getElementById('cloud-empty').style.display = 'none';
  setLoadStatus('ply-btn', displayName, true);
  updateTopbarHint();
}

async function loadStationsFromText(text, displayName) {
  const data = JSON.parse(text);
  const arr = Array.isArray(data) ? data : (data.stations || data.locations || []);
  if (!arr.length) throw new Error('no stations in file');

  // clear existing
  for (const m of markerMeshes.values()) markerGroup.remove(m);
  markerMeshes.clear();
  state.stations = [];

  for (const raw of arr) {
    const id = String(raw.id);
    const position = new THREE.Vector3(raw.x, raw.y, raw.z);
    const quaternion = new THREE.Quaternion(raw.qx, raw.qy, raw.qz, raw.qw).normalize();
    state.stations.push({ id, position, quaternion, raw });
  }

  // Sort stations naturally: numeric ids in numeric order, others lexicographic
  state.stations.sort((a, b) => {
    const na = parseFloat(a.id), nb = parseFloat(b.id);
    const aNum = !isNaN(na) && String(na) === a.id;
    const bNum = !isNaN(nb) && String(nb) === b.id;
    if (aNum && bNum) return na - nb;
    return a.id.localeCompare(b.id);
  });

  detectAndApplyUnits();
  rebuildMarkers();
  rebuildSceneScale();
  rebuildStationList();
  frameAll();
  setLoadStatus('json-btn', `${state.stations.length} stations`, true);
  updateTopbarHint();
}

function matchPanoNameToStation(baseName, fileIndex) {
  if (CONFIG.PANO_MATCH_MODE === 'sequence') {
    return state.stations[fileIndex] || null;
  }

  if (CONFIG.PANO_MATCH_MODE === 'id-shift') {
    const match = baseName.match(/(\d+)/);
    if (!match) return null;
    const fileNum = parseInt(match[1], 10);
    const targetId = String(fileNum + CONFIG.PANO_ID_SHIFT);
    return state.stations.find(s => s.id === targetId) || null;
  }

  // 'id' mode
  let station = state.stations.find(s => baseName === s.id);
  if (!station) {
    station = state.stations.find(s => {
      const re = new RegExp(`(^|[^0-9a-zA-Z])${s.id}([^0-9a-zA-Z]|$)`);
      return re.test(baseName);
    });
  }
  return station || null;
}

function basenameFromUrl(url) {
  const path = url.split('?')[0].split('#')[0];
  const file = path.split('/').pop();
  return file.replace(/\.[^.]+$/, '');
}

document.getElementById('pano-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  setLoadStatus('pano-btn', `loading ${files.length}…`);

  // Sort sequentially-named files naturally for sequence mode
  files.sort((a, b) => {
    const na = parseInt((a.name.match(/(\d+)/) || ['0'])[0], 10);
    const nb = parseInt((b.name.match(/(\d+)/) || ['0'])[0], 10);
    return na - nb;
  });

  let matched = 0;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const baseName = file.name.replace(/\.[^.]+$/, '');
    const station = matchPanoNameToStation(baseName, i);
    if (!station) continue;

    const url = URL.createObjectURL(file);
    const tex = await loadTexture(url);
    state.panoTextures.set(station.id, tex);
    matched++;
  }

  rebuildStationList();
  setLoadStatus('pano-btn', `${matched}/${files.length} matched`, matched > 0);
  updateTopbarHint();
});

function loadTexture(url) {
  return new Promise((resolve, reject) => {
    new THREE.TextureLoader().load(url, (tex) => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      resolve(tex);
    }, undefined, reject);
  });
}

/* ============================================================
   UNIT DETECTION
   ============================================================ */
function detectAndApplyUnits() {
  if (state.unitMode !== 'auto') {
    state.unitScale = ({ m: 1, ft: 0.3048, in: 0.0254, mm: 0.001 })[state.unitMode] || 1;
    state.detectedUnit = state.unitMode;
    updateUnitsLabel();
    return;
  }

  if (!state.pointCloud || !state.stations.length) {
    state.unitScale = 1;
    state.detectedUnit = null;
    updateUnitsLabel();
    return;
  }

  // Compare extents: stations are in meters, PLY is in unknown units.
  // Find ratio of (PLY extent) / (stations extent) and snap to known conversions.
  const pBox = state.pointCloud.geometry.boundingBox;
  const pSize = new THREE.Vector3();
  pBox.getSize(pSize);
  const pExtent = Math.max(pSize.x, pSize.y, pSize.z);

  const xs = state.stations.map(s => s.position.x);
  const ys = state.stations.map(s => s.position.y);
  const zs = state.stations.map(s => s.position.z);
  const sExtent = Math.max(
    Math.max(...xs) - Math.min(...xs),
    Math.max(...ys) - Math.min(...ys),
    Math.max(...zs) - Math.min(...zs),
    0.01
  );

  const ratio = pExtent / sExtent;

  // Known ratios: PLY units per meter
  const candidates = [
    { name: 'm',  ratio: 1,        scale: 1 },
    { name: 'ft', ratio: 3.2808,   scale: 0.3048 },
    { name: 'in', ratio: 39.3701,  scale: 0.0254 },
    { name: 'mm', ratio: 1000,     scale: 0.001 },
  ];

  // If stations are highly clustered relative to scan, ratio will be too high.
  // We're looking for the closest match among known unit ratios using log-space distance.
  let best = candidates[0];
  let bestDist = Infinity;
  for (const c of candidates) {
    const d = Math.abs(Math.log(ratio / c.ratio));
    if (d < bestDist) { bestDist = d; best = c; }
  }

  // If even the best match is way off (more than ~2× off in log space),
  // we don't trust the detection and fall back to meters.
  if (bestDist > 0.7) {
    state.unitScale = 1;
    state.detectedUnit = null;
  } else {
    state.unitScale = best.scale;
    state.detectedUnit = best.name;
  }
  updateUnitsLabel();
}

function updateUnitsLabel() {
  const el = document.getElementById('cloud-units');
  if (!state.detectedUnit) {
    el.textContent = '';
  } else {
    const auto = state.unitMode === 'auto' ? ' (auto)' : '';
    el.textContent = state.detectedUnit + auto;
  }
}

/* ============================================================
   SCENE SCALING — normalize everything to meters
   ============================================================
   Strategy: scale the point cloud by unitScale so it ends up in meters
   along with the stations. Markers and stations stay in raw meters.
   This way the whole scene shares one consistent unit (meters) and
   marker sizing can be deterministic. */
function rebuildSceneScale() {
  if (state.pointCloud) {
    state.pointCloud.scale.setScalar(state.unitScale);
  }
  // marker positions are in meters already, no scaling needed
  rebuildMarkers(); // resize markers in case scale-relevant settings changed
}

/* ============================================================
   MARKERS
   ============================================================ */
function getSceneDiagonal() {
  // Use whichever is bigger: the scaled PLY bbox, or the stations extent.
  let d = 1;
  if (state.pointCloud) {
    const box = state.pointCloud.geometry.boundingBox;
    const size = new THREE.Vector3();
    box.getSize(size);
    d = Math.max(d, size.length() * state.unitScale);
  }
  if (state.stations.length) {
    const xs = state.stations.map(s => s.position.x);
    const ys = state.stations.map(s => s.position.y);
    const zs = state.stations.map(s => s.position.z);
    const sx = Math.max(...xs) - Math.min(...xs);
    const sy = Math.max(...ys) - Math.min(...ys);
    const sz = Math.max(...zs) - Math.min(...zs);
    d = Math.max(d, Math.hypot(sx, sy, sz));
  }
  return d;
}

function rebuildMarkers() {
  // clear
  for (const m of markerMeshes.values()) {
    markerGroup.remove(m);
    m.material.dispose();
  }
  markerMeshes.clear();

  if (!state.stations.length) return;

  const diag = getSceneDiagonal();
  const markerRadius = Math.max(0.05, diag * 0.005);  // 0.5% of scene diagonal

  const geomSphere = new THREE.SphereGeometry(markerRadius, 16, 12);

  for (const station of state.stations) {
    // Each marker gets its own material so color can change individually
    const isActive = station.id === state.activeStationId;
    const mat = new THREE.MeshBasicMaterial({
      color: isActive ? MARKER_COLOR_ACTIVE : MARKER_COLOR_IDLE,
    });
    const marker = new THREE.Mesh(geomSphere, mat);
    marker.position.copy(station.position);
    marker.userData.stationId = station.id;
    marker.visible = state.showMarkers;
    if (isActive) marker.scale.setScalar(1.4);
    markerGroup.add(marker);
    markerMeshes.set(station.id, marker);
  }

  // Resize grid to match scene
  cloudScene.remove(gridHelper);
  gridHelper.geometry.dispose();
  gridHelper.material.dispose();
  const gridSize = Math.max(20, Math.ceil(diag));
  const gridDiv = Math.min(gridSize, 50);
  gridHelper = new THREE.GridHelper(gridSize, gridDiv, 0x2a2a30, 0x1a1a1e);
  gridHelper.visible = state.showGrid;
  cloudScene.add(gridHelper);
}

/* ============================================================
   STATION ACTIVATION
   ============================================================ */
function setActiveStation(stationId) {
  state.activeStationId = stationId;
  const station = state.stations.find(s => s.id === stationId);
  const tex = state.panoTextures.get(stationId);

  // Update list highlight
  document.querySelectorAll('.station').forEach(el => {
    el.classList.toggle('active', el.querySelector('.name')?.textContent === `Station ${stationId}`);
  });

  // Update marker colors and scales
  for (const [id, marker] of markerMeshes) {
    const isActive = id === stationId;
    marker.material.color.setHex(isActive ? MARKER_COLOR_ACTIVE : MARKER_COLOR_IDLE);
    marker.scale.setScalar(isActive ? 1.4 : 1);
  }

  // Update pano viewport
  if (tex && station) {
    panoSphere.material.map = tex;
    panoSphere.material.needsUpdate = true;
    panoSphere.visible = true;
    document.getElementById('pano-empty').style.display = 'none';
    document.getElementById('pano-station-label').textContent = stationId;
    document.getElementById('pano-controls').classList.add('show');
    panoView.lon = 0;
    panoView.lat = 0;
  } else {
    panoSphere.visible = false;
    document.getElementById('pano-empty').style.display = 'flex';
    document.getElementById('pano-station-label').textContent = '';
    document.getElementById('pano-controls').classList.remove('show');
  }
  updatePanoNavButtons();
}

function updatePanoNavButtons() {
  const stationsWithPanos = state.stations.filter(s => state.panoTextures.has(s.id));
  const idx = stationsWithPanos.findIndex(s => s.id === state.activeStationId);
  document.getElementById('pano-prev').disabled = idx <= 0;
  document.getElementById('pano-next').disabled = idx === -1 || idx >= stationsWithPanos.length - 1;
}

function navStation(delta) {
  const stationsWithPanos = state.stations.filter(s => state.panoTextures.has(s.id));
  if (!stationsWithPanos.length) return;
  let idx = stationsWithPanos.findIndex(s => s.id === state.activeStationId);
  if (idx === -1) idx = 0;
  else idx = Math.max(0, Math.min(stationsWithPanos.length - 1, idx + delta));
  setActiveStation(stationsWithPanos[idx].id);
}

document.getElementById('pano-prev').addEventListener('click', () => navStation(-1));
document.getElementById('pano-next').addEventListener('click', () => navStation(1));

   ============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
cloudRenderer.domElement.addEventListener('click', (e) => {
  const rect = cloudRenderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, cloudCamera);
  const hits = raycaster.intersectObjects([...markerMeshes.values()], false);
  if (hits.length) {
    const id = hits[0].object.userData.stationId;
    if (state.panoTextures.has(id)) setActiveStation(id);
  }
});

cloudRenderer.domElement.addEventListener('pointermove', (e) => {
  const rect = cloudRenderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, cloudCamera);
  const hits = raycaster.intersectObjects([...markerMeshes.values()], false);
  cloudRenderer.domElement.style.cursor = (hits.length && state.panoTextures.has(hits[0].object.userData.stationId)) ? 'pointer' : '';
});

/* ============================================================
   FRAMING
   ============================================================ */
function frameAll() {
  let center = new THREE.Vector3();
  let radius = 5;

  if (state.pointCloud) {
    const box = state.pointCloud.geometry.boundingBox;
    const c = new THREE.Vector3();
    box.getCenter(c);
    c.multiplyScalar(state.unitScale);
    const size = new THREE.Vector3();
    box.getSize(size);
    radius = Math.max(radius, size.length() * 0.5 * state.unitScale);
    center.copy(c);
  } else if (state.stations.length) {
    const xs = state.stations.map(s => s.position.x);
    const ys = state.stations.map(s => s.position.y);
    const zs = state.stations.map(s => s.position.z);
    center.set(
      (Math.min(...xs) + Math.max(...xs)) / 2,
      (Math.min(...ys) + Math.max(...ys)) / 2,
      (Math.min(...zs) + Math.max(...zs)) / 2
    );
    const sx = Math.max(...xs) - Math.min(...xs);
    const sy = Math.max(...ys) - Math.min(...ys);
    const sz = Math.max(...zs) - Math.min(...zs);
    radius = Math.max(radius, Math.hypot(sx, sy, sz) * 0.5);
  }

  // transform center through coordRoot
  const worldCenter = center.clone().applyMatrix4(coordRoot.matrixWorld);
  const dist = radius * 2.5;
  cloudCamera.position.copy(worldCenter).add(new THREE.Vector3(dist, dist, dist));
  cloudControls.target.copy(worldCenter);
  cloudControls.update();
}

function animate() {
  requestAnimationFrame(animate);

  cloudControls.update();

  // Pano camera look direction from lon/lat
  if (panoSphere.visible) {
    const phi = THREE.MathUtils.degToRad(90 - panoView.lat);
    const theta = THREE.MathUtils.degToRad(panoView.lon);
    const target = new THREE.Vector3(
      500 * Math.sin(phi) * Math.cos(theta),
      500 * Math.cos(phi),
      500 * Math.sin(phi) * Math.sin(theta)
    );
    panoCamera.lookAt(target);
  }

  cloudRenderer.render(cloudScene, cloudCamera);
  panoRenderer.render(panoScene, panoCamera);
}

/* ============================================================
   AUTO-LOAD FROM CONFIG
   ============================================================ */
async function autoLoadFromConfig() {
  // project name in topbar
  if (CONFIG.PROJECT_NAME) {
    document.querySelector('.title').innerHTML = `Scan Viewer <span style="color:var(--text-faint);font-weight:400;margin-left:8px;">·</span> <span style="color:var(--text-dim);font-weight:500;margin-left:8px;">${CONFIG.PROJECT_NAME}</span>`;
  }

  // Load PLY and stations in parallel; both complete before panos
  const tasks = [];

  if (CONFIG.PLY_URL) {
    setLoadStatus('ply-btn', 'fetching…');
    tasks.push((async () => {
      try {
        const resp = await fetch(CONFIG.PLY_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const buffer = await resp.arrayBuffer();
        const name = CONFIG.PLY_URL.split('/').pop();
        await loadPLYFromBuffer(buffer, name);
      } catch (err) {
        console.error('PLY auto-load failed:', err);
        setLoadStatus('ply-btn', `failed: ${err.message}`);
      }
    })());
  }

  if (CONFIG.STATIONS_URL) {
    setLoadStatus('json-btn', 'fetching…');
    tasks.push((async () => {
      try {
        const resp = await fetch(CONFIG.STATIONS_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        const name = CONFIG.STATIONS_URL.split('/').pop();
        await loadStationsFromText(text, name);
      } catch (err) {
        console.error('Stations auto-load failed:', err);
        setLoadStatus('json-btn', `failed: ${err.message}`);
      }
    })());
  }

  await Promise.all(tasks);

  // Panos depend on stations being loaded first
  let panoUrls = CONFIG.PANO_URLS;

  // If a folder is configured, derive URLs from station list according to match mode
  if (CONFIG.PANO_FOLDER && state.stations.length) {
    const folder = CONFIG.PANO_FOLDER.endsWith('/') ? CONFIG.PANO_FOLDER : CONFIG.PANO_FOLDER + '/';
    const ext = CONFIG.PANO_EXT.replace(/^\./, '');
    panoUrls = state.stations.map((station, i) => {
      let num;
      if (CONFIG.PANO_MATCH_MODE === 'sequence') {
        num = i + 1;                                  // 1-indexed by position
      } else if (CONFIG.PANO_MATCH_MODE === 'id-shift') {
        num = parseInt(station.id, 10) - CONFIG.PANO_ID_SHIFT;
      } else {
        num = station.id;                              // 'id' — filename matches id literally
      }
      return `${folder}${num}.${ext}`;
    });
  }

  if (panoUrls && panoUrls.length && state.stations.length) {
    setLoadStatus('pano-btn', `fetching ${panoUrls.length}…`);
    let matched = 0;
    let failed = 0;
    for (let i = 0; i < panoUrls.length; i++) {
      const url = panoUrls[i];
      const baseName = basenameFromUrl(url);
      const station = matchPanoNameToStation(baseName, i);
      if (!station) {
        console.warn(`No station match for pano: ${url}`);
        continue;
      }
      try {
        const tex = await loadTexture(url);
        state.panoTextures.set(station.id, tex);
        matched++;
      } catch (err) {
        failed++;
        console.warn(`Pano load failed: ${url}`, err);
      }
    }
    rebuildStationList();
    const failNote = failed > 0 ? ` (${failed} failed)` : '';
    setLoadStatus('pano-btn', `${matched}/${panoUrls.length} loaded${failNote}`, matched > 0);
    updateTopbarHint();
  }
}

autoLoadFromConfig();

</script>
</body>
</html>
